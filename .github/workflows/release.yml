name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; npm run build; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          shared-key: jarvis-release
          cache-all-crates: true

      - name: Build jarvis-app
        run: cargo build --release -p jarvis-app
        shell: pwsh

      - name: Copy native libraries to target/release
        run: python scripts/tools/post_build.py --force
        shell: pwsh

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: crates/jarvis-gui
          tauriScript: npm run tauri --prefix frontend
          tagName: ${{ github.ref_name }}
          releaseName: JARVIS ${{ github.ref_name }}
          releaseBody: |
            Установите обновление кнопкой «Обновить» в программе
            или скачайте установщик ниже.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
