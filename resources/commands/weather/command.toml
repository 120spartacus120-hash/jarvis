[[commands]]
id = "weather"
type = "lua"
script = "script.lua"
timeout = 5000
sandbox = "standard"
phrases.ru = ["какая погода в {city}", "погода {city}"]
phrases.en = ["what's the weather in {city}", "weather in {city}"]
sounds.ru = ["weather_ru_1", "weather_ru_2"]
sounds.en = ["weather_en_1", "weather_en_2"]

[commands.slots.city]
entity = "city name"
context = ["in", "for", "at", "в", "для"]

[[commands]]
id = "set_city"
type = "lua"
script = "set_city.lua"
sandbox = "standard"
timeout = 5000
phrases.ru = ["установи город"]
phrases.en = ["set city", "change city"]